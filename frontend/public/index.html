    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>ShopMart - Shop Smart, Shop Big!</title>

    <!-- ✅ Register Service Worker early — before React loads -->
    <!-- This is critical for Chrome Android to recognize the app as installable -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(function (reg) {
              console.log('✅ SW registered early:', reg.scope);
            })
            .catch(function (err) {
              console.error('❌ SW registration failed:', err);
            });
        });
      }
    </script>
